    acceptance_criteria:
      - Switch control visible when memberships.length greater than 1
      - Modal lists organization name type and role; full-row button min-height 44px
      - Switch calls BFF; success setSession and routeAfterLogin; mfa_required redirects to /mfa with returnTo
      - PermissionGate applied to AdminShell nav; cross-role paths denied
      - /account shows password shortcut MFA link interpreter empty state and WorkstationCta when tenant_id absent
